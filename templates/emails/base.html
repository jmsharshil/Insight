<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: {{ primary_color }};
            padding: 20px;
            text-align: center;
        }
        .header img {
            max-height: 60px;
        }
        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
        }
        .content {
            padding: 30px;
            color: #333333;
            line-height: 1.6;
        }
        .content h2 {
            color: {{ primary_color }};
            font-size: 20px;
            margin-top: 0;
        }
        .footer {
            background-color: #f9f9f9;
            padding: 20px;
            text-align: center;
            font-size: 12px;
            color: #777777;
            border-top: 1px solid #eeeeee;
        }
        .footer a {
            color: {{ primary_color }};
            text-decoration: none;
        }
        .button {
            display: inline-block;
            padding: 12px 24px;
            margin-top: 20px;
            background-color: {{ primary_color }};
            color: #ffffff;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        .info-box {
            background-color: #f8f9fa;
            border-left: 4px solid {{ primary_color }};
            padding: 15px;
            margin: 20px 0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            {% if logo_url %}
            <img src="{{ logo_url }}" alt="{{ org_name }} Logo">
            {% else %}
            <h1>{{ org_name }}</h1>
            {% endif %}
        </div>
        
        <div class="content">
            {% block content %}
            {% endblock %}
        </div>
        
        <div class="footer">
            {% if footer_text %}
            <p>{{ footer_text|linebreaksbr }}</p>
            {% else %}
            <p>&copy; {% now "Y" %} {{ org_name }}. All rights reserved.</p>
            {% endif %}
            
            {% if website_url %}
            <p><a href="{{ website_url }}">Visit our website</a></p>
            {% endif %}
        </div>
    </div>
</body>
</html>
