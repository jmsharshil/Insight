name: Deploy Python app to Azure Web App - InsightInstitute

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: azure/webapps-deploy@v3
        with:
          app-name: InsightInstitute
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_69AF17767E194EA88227728D78F6D107 }}